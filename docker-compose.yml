version: '3.8'

# definicja sieci z reczna konfiguracja adresacji
networks:
  proxy-net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
  app-net:
    ipam:
      config:
        - subnet: 172.31.0.0/24
          gateway: 172.31.0.1
  db-net:
    ipam:
      config:
        - subnet: 172.32.0.0/24
          gateway: 172.32.0.1

# nazwane wolumeny najwyzszego poziomu
volumes:
  postgres-data:
  redis-data:

# sekrety najwyzszego poziomu zrodla w plikach
secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt

# pliki konfiguracyjne najwyzszego poziomu
configs:
  nginx_config:
    file: ./nginx.conf
  app_config:
    file: ./backend/app.config.json

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - proxy-net
    # ladowanie pliku konfiguracyjnego nginx
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    # oczekiwanie na uruchomienie backendow
    depends_on:
      backend_1:
        condition: service_started
      backend_2:
        condition: service_started

  backend_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
    # dostarczanie sekretow do kontenera
    secrets:
      - db_user
      - db_password
    # wstrzykiwanie pliku konfiguracyjnego
    configs:
      - source: app_config
        target: /app/app.config.json
    networks:
      - proxy-net
      - app-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # nadpisanie portu dla drugiej instancji
      - BACKEND_PORT=3001
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
    secrets:
      - db_user
      - db_password
    configs:
      - source: app_config
        target: /app/app.config.json
    networks:
      - proxy-net
      - app-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
    secrets:
      - db_user
      - db_password
    networks:
      - app-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - app-net
    # sprawdzanie dostepnosci bazy redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      # ustawienie wczytywania uwierzytelniania z zamontowanych sekretow
      - POSTGRES_USER_FILE=/run/secrets/db_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_user
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-net
    # sprawdzanie gotowosci bazy danych
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - db-net