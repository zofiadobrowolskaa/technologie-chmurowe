cat << 'EOF' > frontend/nginx.conf
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:5m inactive=30s;

upstream backend {
    server api-a:3000;
}

server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/stats {
        proxy_pass http://backend/stats;
        proxy_cache api_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/ {
        proxy_pass http://backend/;
    }
}
EOF