# globalna konfiguracja serwera
events {
    worker_connections 1024;
}

http {
    # definicja grupy backendow
    upstream backend {
        server backend_1:3000;
        server backend_2:3001;
    }

    # nasluchiwanie na zewnetrzny ruch
    server {
        listen 80;

        location / {
            proxy_pass http://backend;
        }
    }
}